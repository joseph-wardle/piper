# /groups/bobo/pipeline/piper.toml
# Show-level piper configuration.

[scripts]
# Directory order matters. First match wins for `piper run <script>`.
# Paths may be absolute or relative to this file's directory.
dirs = [
  "/groups/bobo/pipeline/piper/scripts",
]

[goto]
# `{root}` is the resolved show root (for bobo: /groups/bobo)
# `{id}` is the command identifier (for example F_160 or fence_door)

shot = [
  "{root}/production/shot/{id}",
]

# Assets in bobo are distributed across multiple roots and nested categories. :(
# Candidate order is deterministic: first existing path wins.
asset = [
  "{root}/production/asset/{id}",
  "{root}/production/asset/*/{id}",
  "{root}/production/asset/*/*/{id}",
  "{root}/production/assets/{id}",
  "{root}/production/assets/*/{id}",
  "{root}/production/character/{id}",
]

environment = [
  "{root}/production/set/{id}",
  "{root}/production/asset/environment/{id}",
]
