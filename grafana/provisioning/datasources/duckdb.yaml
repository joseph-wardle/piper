# Grafana datasource — Piper DuckDB warehouse (read-only)
#
# Plugin: motherduck-duckdb-datasource (unsigned, installed via scripts/setup_grafana_plugin.sh)
# Allowed via GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS in docker-compose.yml.
#
# The database file is mounted into the container at /var/piper/telemetry.duckdb
# via docker-compose.yml.  Do not change the path here without updating the
# volume mount in docker-compose.yml.

apiVersion: 1

datasources:
  - name: Piper DuckDB
    type: motherduck-duckdb-datasource
    uid: piper_duckdb
    isDefault: true
    editable: false
    jsonData:
      path: /var/piper/telemetry.duckdb
