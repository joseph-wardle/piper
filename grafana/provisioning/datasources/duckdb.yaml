# Grafana datasource — Piper DuckDB warehouse
#
# Plugin: motherduck-duckdb-datasource (unsigned, installed via scripts/setup_grafana_plugin.sh)
# Allowed via GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS in docker-compose.yml.
#
# The warehouse directory is mounted into the container at /var/piper via
# docker-compose.yml so the DuckDB plugin can open the database normally.
# Do not change the path here without updating the volume mount in
# docker-compose.yml.

apiVersion: 1

datasources:
  - name: Piper DuckDB
    type: motherduck-duckdb-datasource
    uid: piper_duckdb
    isDefault: true
    editable: false
    jsonData:
      path: /var/piper/telemetry.duckdb
